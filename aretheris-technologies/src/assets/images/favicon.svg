<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gradientTop" x1="250" y1="50" x2="250" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="gradientRight" x1="250" y1="250" x2="415" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="gradientLeft" x1="85" y1="345" x2="250" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="25%" stop-color="#22d3ee" />
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background for high contrast inside browser tabs -->
  <rect width="100%" height="100%" fill="#020617" rx="90" />

  <!-- Outer backing glow -->
  <circle cx="250" cy="250" r="140" fill="url(#coreGlow)" opacity="0.4" />

  <g filter="url(#neonGlow)">
    <!-- LOBE 1: Top -->
    <g transform="rotate(0, 250, 250)">
      <path d="M 250,230 C 180,210 160,140 250,50 C 340,140 320,210 250,230 Z" stroke="url(#gradientTop)" stroke-width="10" fill="none" opacity="0.9" />
      <path d="M 250,210 C 200,195 185,145 250,80 C 315,145 300,195 250,210 Z" stroke="url(#gradientTop)" stroke-width="4" fill="none" opacity="0.7" />
    </g>

    <!-- LOBE 2: Bottom-Right -->
    <g transform="rotate(120, 250, 250)">
      <path d="M 250,230 C 180,210 160,140 250,50 C 340,140 320,210 250,230 Z" stroke="url(#gradientRight)" stroke-width="10" fill="none" opacity="0.9" />
      <path d="M 250,210 C 200,195 185,145 250,80 C 315,145 300,195 250,210 Z" stroke="url(#gradientRight)" stroke-width="4" fill="none" opacity="0.7" />
    </g>

    <!-- LOBE 3: Bottom-Left -->
    <g transform="rotate(240, 250, 250)">
      <path d="M 250,230 C 180,210 160,140 250,50 C 340,140 320,210 250,230 Z" stroke="url(#gradientLeft)" stroke-width="10" fill="none" opacity="0.9" />
      <path d="M 250,210 C 200,195 185,145 250,80 C 315,145 300,195 250,210 Z" stroke="url(#gradientLeft)" stroke-width="4" fill="none" opacity="0.7" />
    </g>

    <!-- Central Atomic Orbits -->
    <g>
      <ellipse cx="250" cy="250" rx="75" ry="25" stroke="#22d3ee" stroke-width="5" stroke-dasharray="8 8" fill="none" transform="rotate(30, 250, 250)" opacity="0.85" />
      <ellipse cx="250" cy="250" rx="75" ry="25" stroke="#ec4899" stroke-width="5" fill="none" transform="rotate(150, 250, 250)" opacity="0.75" />
      <ellipse cx="250" cy="250" rx="75" ry="25" stroke="#8b5cf6" stroke-width="5" fill="none" transform="rotate(270, 250, 250)" opacity="0.8" />
    </g>

    <!-- Center node -->
    <circle cx="250" cy="250" r="18" fill="url(#coreGlow)" />
    <circle cx="250" cy="250" r="8" fill="#ffffff" />
  </g>
</svg>